# OpenEnv specification
openenv_version: "1.0"
name: "SRE Incident Response Environment"

environment:
  name: "SRE Incident Response Environment"
  description: >
    An OpenEnv-compliant RL environment where an AI agent acts as a Site
    Reliability Engineer responding to real production incidents. The agent
    investigates alerts, identifies root causes, applies remediations,
    and communicates status updates across three difficulty tiers.
  version: "1.0.0"
  author: "saumy-a"

server:
  framework: "fastapi"
  entrypoint: "server.app:app"
  port: 7860
  health_endpoint: "/health"

endpoints:
  health: { method: "GET",  path: "/health", response: "ServerStatus" }
  tasks:  { method: "GET",  path: "/tasks",  response: "list[TaskConfig]" }
  state:  { method: "GET",  path: "/state",  response: "Observation" }
  reset:  { method: "POST", path: "/reset",  request: "ResetRequest",  response: "ResetResponse" }
  step:   { method: "POST", path: "/step",   request: "StepRequest",   response: "StepResult" }
  grader: { method: "POST", path: "/grader", request: "GradeRequest",  response: "GraderResult" }

tasks:
  - id: easy
    name: "Payment API 500s after Deploy"
    difficulty: easy
    metric: reward
    threshold: 0.60
    description: "Payment API error rate spikes after deploy — find root cause and rollback"

  - id: medium
    name: "Database Connection Pool Exhaustion"
    difficulty: medium
    metric: reward
    threshold: 0.60
    description: "Three services returning 503s due to shared DB pool exhaustion"

  - id: hard
    name: "CDN Misconfiguration Global Latency"
    difficulty: hard
    metric: reward
    threshold: 0.60
    description: "Global latency 8x baseline with 23 noisy alerts — find true CDN root cause"

grading:
  score_range: [0.0, 1.0]
  score_type: float
  endpoint: "/grader"

inference:
  script: "inference.py"
  command: "python inference.py"

deployment:
  platform: "huggingface-spaces"
  docker: true
  port: 7860
